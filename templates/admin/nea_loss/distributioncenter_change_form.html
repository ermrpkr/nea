{% extends "admin/base.html" %}
{% block title %}Change DC Start Month{% endblock %}
{% block content %}
<div class="module">
    <div class="module">
        <div class="module-header">
            <h2>Change Distribution Center Start Month</h2>
        </div>
        <div class="module-content">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_distributioncenter">Distribution Center:</label>
                    <select name="id_distributioncenter" class="form-control" required>
                        <option value="">— Select Distribution Center —</option>
                        {% for dc in distribution_centers %}
                        <option value="{{ dc.pk }}">{{ dc.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="report_start_month">New Start Month:</label>
                    <select name="report_start_month" class="form-control" required>
                        <option value="">— Select Month —</option>
                        {% for month_num, month_name in month_choices %}
                        <option value="{{ month_num }}">{{ month_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Change Start Month</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
