[options]
pythonVersion = "3.12"

[deploy]
startCommand = "gunicorn nea_project.wsgi --workers 2 --threads 2 --bind 0.0.0.0:$PORT"

[[buildSteps]]
name = "install"
commands = ["pip install -r requirements.txt"]

[[buildSteps]]
name = "collectstatic"
commands = ["python manage.py collectstatic --noinput"]
